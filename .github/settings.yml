# .github/settings.yml — Repository configuration via the Settings app
# https://github.com/apps/settings
#
# Applies declarative repository settings to orchestras/dev-patterns.
# The Settings app reads this on every push to the default branch.

repository:
  name: dev-patterns
  description: "Central patterns library: git hooks, mise tasks, and subscription channels for orchestras repositories"
  homepage: https://github.com/orchestras/dev-patterns
  topics: githooks, mise, patterns, devtools, orchestras
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false
  default_branch: main

  # Merge strategy — rebase only (no merge commits, no squash)
  allow_squash_merge: false
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: false

  # Keep branches after merge
  delete_branch_on_merge: true

  # Security
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true

# ─── Rulesets (replaces classic branch protection) ───────────────────────────
# Note: The Settings app v2 supports rulesets via the `rulesets` key.
# We define one ruleset covering both main and develop.

rulesets:
  - name: protect-main-and-develop
    target: branch
    enforcement: active

    # Match both main and develop
    conditions:
      ref_name:
        include:
          - refs/heads/main
          - refs/heads/develop
        exclude: []

    # Who can bypass (repo admins only)
    bypass_actors:
      - actor_type: RepositoryRole
        actor_id: 5  # admin role
        bypass_mode: always

    rules:
      # Prevent force pushes to main/develop
      - type: non_fast_forward

      # Require linear history (rebase only)
      - type: required_linear_history

      # Require a pull request before merging
      - type: pull_request
        parameters:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: true
          require_last_push_approval: false
          # Always invite Copilot on PRs
          allowed_merge_methods:
            - rebase

      # Require signed commits
      - type: required_signatures

      # Require status checks to pass
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: true  # branches must be up to date
          required_status_checks:
            # CI and code quality
            - context: ci / test
            - context: pr-check / validate
            - context: lint
            # Code scanning / GHAS
            - context: CodeQL
            - context: code-scanning results

      # Require deployments to succeed (if any)
      # - type: required_deployments

      # Prevent deletion of main/develop
      - type: deletion

# ─── Dependabot ──────────────────────────────────────────────────────────────
# Controlled via .github/dependabot.yml — GHAS enabled below

# ─── GHAS / Code Scanning ────────────────────────────────────────────────────
# Advanced Security features are enabled via the ghas-scan workflow.
# CodeQL runs on push to main/develop and weekly.

# lib/deno1a/mise/mise.toml — Channel mise task configuration
#
# This file is SYNCED into the target repo's mise.toml [env] section
# by `mise run patterns:sync`.  It declares env vars and task directories
# that this channel contributes.
#
# When patterns:sync runs it:
#   1. Copies all tasks from lib/$channel/mise/tasks/ → .mise/tasks/
#   2. Merges env vars below into the target repo's mise.toml [env] section
#   3. Writes the current commit hash to .patterns-hash

[channel]
name        = "deno1a"
description = "Deno project (Deno + Mise) patterns channel"
version     = "0.1.0"

[tools]
deno  = "latest"
delta = "latest"

[env]
# Patterns subscription tracking
PATTERNS_CHANNEL = "deno1a"
PATTERNS_REPO    = "orchestras/dev-patterns"

# Git hooks integration
GITHOOKS_VERSION = "main"
GITHOOKS_REPO    = "orchestras/dev-patterns"
GITHOOKS_PROFILE = "deno1a"

# Deno — native TLS for corporate proxy / Zscaler cert injection
DENO_TLS_CA_STORE = "system,mozilla"

# Deno cache location (conventional; can be overridden)
DENO_DIR = "{{config_root}}/.deno-cache"

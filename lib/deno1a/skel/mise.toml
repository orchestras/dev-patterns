# mise.toml — tool versions, env, and task discovery
# All tasks live in .mise/tasks/ as executable scripts.
# Run `mise tasks` for a full list with descriptions.
# Run `mise run <task>` to execute a task.
# Docs: https://mise.jdx.dev/

[tools]
deno  = "{{ skel.deno_version }}"
node  = "22"
delta = "latest"

[settings]
task_output = "prefix"
experimental = true

[env]
# Deno cache location
DENO_DIR = "{{config_root}}/.deno-cache"

# Deno native TLS for corporate proxy / Zscaler cert injection
DENO_TLS_CA_STORE = "system,mozilla"

# Patterns subscription tracking
PATTERNS_CHANNEL = "deno1a"
PATTERNS_REPO    = "orchestras/dev-patterns"

# Git hooks integration
GITHOOKS_VERSION = "main"
GITHOOKS_REPO    = "orchestras/dev-patterns"
GITHOOKS_PROFILE = "deno1a"

# ─── Skeleton file registry ───────────────────────────────────────────────────
# Files listed here are managed by patterns:sync (sync:down) and can be
# pushed back to dev-patterns with sync:up. Any file newer than its
# corresponding lib/deno1a/skel/ counterpart will be included in a sync:up PR.
[skel]
files = [
  "README.md",
  "AGENTS.md",
  ".github/CODEOWNERS",
  ".github/PULL_REQUEST_TEMPLATE.md",
  ".github/settings.yml",
  ".github/workflows/ci.yml",
  ".github/workflows/pr-check.yml",
  ".github/workflows/dispatch-sync-down.yml",
  ".github/workflows/dispatch-sync-up.yml",
  "mise.toml",
]

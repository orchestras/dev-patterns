# .github/settings.yml — Repository configuration via the Settings app
# https://github.com/apps/settings
#
# Applies declarative repository settings whenever this file changes on the
# default branch. Run `mise run dispatch:configure` to trigger manually.

repository:
  name: "{{ skel.repo_name }}"
  description: "{{ skel.project_description }}"
  homepage: "https://github.com/{{ skel.github_org }}/{{ skel.repo_name }}"
  topics: "deno,typescript,mise,orchestras"
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false
  default_branch: develop

  # Merge strategy — rebase and squash only (no merge commits)
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: false
  delete_branch_on_merge: true

  # Security
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true

# ─── Rulesets ────────────────────────────────────────────────────────────────
# These mirror what `mise run vcs:protect` applies via the GitHub API.
# The Settings app applies them declaratively; vcs:protect is the imperative
# equivalent used for initial setup or manual re-application.
#
# Ruleset actor_id 5 = RepositoryRole: admin

rulesets:

  # ── 1. branch-and-commit-restrictions (ALL branches) ──────────────────────
  # Enforces signed commits, PR + code-owner review, required status checks,
  # code scanning gate, conventional-commit message format, and branch name
  # convention across every branch in the repository.
  - name: branch-and-commit-restrictions
    target: branch
    enforcement: active

    conditions:
      ref_name:
        include:
          - ~ALL
        exclude: []

    bypass_actors:
      - actor_type: RepositoryRole
        actor_id: 5
        bypass_mode: always

    rules:
      # Block deletions and force pushes on all branches
      - type: deletion
      - type: non_fast_forward

      # Require GPG / SSH signed commits
      - type: required_signatures

      # Require a pull request before merging
      - type: pull_request
        parameters:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_last_push_approval: false
          require_code_owner_review: true
          allowed_merge_methods:
            - squash
            - rebase

      # Require status checks to pass before merging
      # Job names must match pr-check.yml job names exactly (pr-check / <job>)
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: true
          do_not_enforce_on_create: true
          required_status_checks:
            - context: "pr-check / lint"
            - context: "pr-check / typecheck"
            - context: "pr-check / test"
            - context: "pr-check / security"
            - context: "CodeQL"
            - context: "code-scanning results / CodeQL"

      # Require CodeQL code scanning results — errors block merge
      - type: code_scanning
        parameters:
          code_scanning_tools:
            - tool: CodeQL
              security_alerts_threshold: errors
              alerts_threshold: errors

      # Enforce branch naming convention
      - type: branch_name_pattern
        parameters:
          name: branch-name-convention
          negate: false
          operator: regex
          pattern: "^(main|develop|feature/.+|chore/.+|fix/.+|cursor/.+|release/.+|hotfix/.+)$"

      # Enforce Conventional Commits format on commit messages
      - type: commit_message_pattern
        parameters:
          name: conventional-commits
          negate: false
          operator: regex
          pattern: "^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\\([^)]+\\))?!?: .+"

  # ── 2. develop-protection (refs/heads/develop) ────────────────────────────
  # Prevents direct creation, pushes, and deletions to develop.
  # Merges must go through a PR (governed by branch-and-commit-restrictions).
  - name: develop-protection
    target: branch
    enforcement: active

    conditions:
      ref_name:
        include:
          - refs/heads/develop
        exclude: []

    bypass_actors:
      - actor_type: RepositoryRole
        actor_id: 5
        bypass_mode: pull_request

    rules:
      - type: creation
      - type: update
      - type: deletion
      - type: non_fast_forward

  # ── 3. main-protection (refs/heads/main) ──────────────────────────────────
  # Prevents direct creation, pushes, and deletions to main.
  # Releases are gated through develop → main via vcs:release.
  - name: main-protection
    target: branch
    enforcement: active

    conditions:
      ref_name:
        include:
          - refs/heads/main
        exclude: []

    bypass_actors:
      - actor_type: RepositoryRole
        actor_id: 5
        bypass_mode: pull_request

    rules:
      - type: creation
      - type: update
      - type: deletion
      - type: non_fast_forward

# ─── Dependabot ──────────────────────────────────────────────────────────────
# Controlled via .github/dependabot.yml

# ─── GHAS / Code Scanning ────────────────────────────────────────────────────
# CodeQL runs on push to main/develop and on every PR via pr-check.yml.
# The code_scanning rule above gates merges on CodeQL results (errors threshold).
